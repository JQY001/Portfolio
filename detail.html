<head>

    <title>Detail Proyek | Ryvaldhi Dzacky</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #0f0f0f;
            --secondary: #1a1a1a;
            --bg-card: #1e1e1e;
            --bg-section: #141414;
            --accent: #3b82f6;
            --accent-light: #60a5fa;
            --text-primary: #f1f5f9;
            --text-secondary: #94a3b8;
            --text-muted: #64748b;
            --border: #2a2a2a;
            --border-light: #3a3a3a;
            --shadow-lg: 0 10px 40px rgba(0,0,0,0.5);
            --radius: 12px;
            --radius-sm: 8px;
            --transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            color: var(--text-primary);
            background: var(--primary);
            line-height: 1.6;
            -webkit-font-smoothing: antialiased;
        }

        .container { max-width: 1000px; margin: 0 auto; padding: 0 24px; }

        .navbar {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            z-index: 1000;
            background: rgba(15, 15, 15, 0.92);
            backdrop-filter: blur(16px);
            border-bottom: 1px solid var(--border);
            padding: 16px 0;
        }

        .navbar .container {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .logo {
            font-size: 1.4rem;
            font-weight: 800;
            color: var(--text-primary);
            text-decoration: none;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .logo i { color: var(--accent-light); font-size: 1.6rem; }
        .logo span { color: var(--accent-light); }

        .btn-back {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            color: var(--text-secondary);
            text-decoration: none;
            font-weight: 500;
            transition: var(--transition);
            padding: 8px 20px;
            border-radius: 50px;
            border: 1px solid var(--border);
        }

        .btn-back:hover {
            color: var(--text-primary);
            border-color: var(--accent-light);
            background: rgba(59, 130, 246, 0.05);
        }

        .content { padding: 120px 0 80px; min-height: 100vh; }

        .gallery-container {
            position: relative;
            border-radius: var(--radius);
            overflow: hidden;
            border: 1px solid var(--border);
            margin-bottom: 32px;
            background: var(--secondary);
        }

        .gallery-main {
            position: relative;
            width: 100%;
            height: 420px;
            overflow: hidden;
            cursor: pointer;
        }

        .gallery-main img {
            width: 100%;
            height: 100%;
            object-fit: contain;
            display: block;
            background: var(--secondary);
            transition: var(--transition);
        }

        .gallery-nav {
            position: absolute;
            top: 50%;
            transform: translateY(-50%);
            width: 44px;
            height: 44px;
            border-radius: 50%;
            background: rgba(0,0,0,0.7);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255,255,255,0.1);
            color: white;
            font-size: 1.2rem;
            cursor: pointer;
            transition: var(--transition);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 5;
            opacity: 0;
        }

        .gallery-container:hover .gallery-nav { opacity: 1; }
        .gallery-nav:hover { background: var(--accent); border-color: var(--accent); }
        .gallery-nav.prev { left: 16px; }
        .gallery-nav.next { right: 16px; }
        .gallery-nav.hidden { display: none; }

        .gallery-thumbs {
            display: flex;
            gap: 10px;
            padding: 16px 20px;
            overflow-x: auto;
            background: rgba(0,0,0,0.3);
            scrollbar-width: thin;
            scrollbar-color: var(--border) transparent;
        }

        .gallery-thumbs::-webkit-scrollbar { height: 4px; }
        .gallery-thumbs::-webkit-scrollbar-track { background: transparent; }
        .gallery-thumbs::-webkit-scrollbar-thumb { background: var(--border); border-radius: 10px; }

        .gallery-thumb {
            flex-shrink: 0;
            width: 80px;
            height: 60px;
            border-radius: var(--radius-sm);
            overflow: hidden;
            cursor: pointer;
            border: 2px solid transparent;
            transition: var(--transition);
            opacity: 0.5;
        }

        .gallery-thumb:hover { opacity: 0.8; }
        .gallery-thumb.active { border-color: var(--accent-light); opacity: 1; }

        .gallery-thumb img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
        }

        .gallery-counter {
            position: absolute;
            bottom: 80px;
            right: 20px;
            background: rgba(0,0,0,0.7);
            backdrop-filter: blur(10px);
            padding: 4px 14px;
            border-radius: 50px;
            font-size: 0.8rem;
            color: var(--text-secondary);
            border: 1px solid rgba(255,255,255,0.06);
            z-index: 5;
        }

        .detail-content h1 {
            font-size: 2.5rem;
            margin-bottom: 16px;
            color: var(--text-primary);
            line-height: 1.2;
        }

        .detail-meta {
            display: flex;
            flex-wrap: wrap;
            gap: 20px;
            margin-bottom: 24px;
            padding-bottom: 24px;
            border-bottom: 1px solid var(--border);
        }

        .detail-meta span {
            color: var(--text-secondary);
            font-size: 0.95rem;
        }

        .detail-meta span i {
            color: var(--accent-light);
            margin-right: 8px;
            width: 16px;
        }

        .detail-meta .badge {
            background: rgba(59, 130, 246, 0.15);
            color: var(--accent-light);
            padding: 2px 14px;
            border-radius: 50px;
            font-size: 0.8rem;
            font-weight: 600;
        }

        .detail-meta .badge-skripsi {
            background: rgba(251, 191, 36, 0.15);
            color: #fbbf24;
        }

        .detail-description {
            color: var(--text-secondary);
            font-size: 1.05rem;
            line-height: 1.8;
            margin-bottom: 28px;
        }

        .detail-description strong { color: var(--text-primary); }

        .detail-tools { margin-bottom: 24px; }

        .detail-tools h3 {
            font-size: 1.1rem;
            margin-bottom: 12px;
            color: var(--text-primary);
        }

        .detail-tools .tags {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
        }

        .detail-tools .tags span {
            background: rgba(255,255,255,0.05);
            padding: 6px 18px;
            border-radius: 50px;
            font-size: 0.85rem;
            color: var(--text-secondary);
            border: 1px solid var(--border);
            transition: var(--transition);
        }

        .detail-tools .tags span:hover {
            border-color: var(--accent-light);
            color: var(--text-primary);
        }

        /* TANGGUNG JAWAB */
        .detail-responsibility {
            margin-bottom: 24px;
        }

        .detail-responsibility h3 {
            font-size: 1.1rem;
            margin-bottom: 12px;
            color: var(--text-primary);
        }

        .detail-responsibility ul {
            list-style: none;
            padding: 0;
        }

        .detail-responsibility ul li {
            color: var(--text-secondary);
            padding: 8px 0 8px 28px;
            position: relative;
            border-bottom: 1px solid rgba(255,255,255,0.04);
        }

        .detail-responsibility ul li::before {
            content: '▸';
            position: absolute;
            left: 4px;
            color: var(--accent-light);
        }

        .detail-responsibility ul li:last-child {
            border-bottom: none;
        }

        .detail-hasil {
            background: var(--bg-card);
            padding: 24px 28px;
            border-radius: var(--radius-sm);
            border: 1px solid var(--border);
            margin-top: 8px;
        }

        .detail-hasil h3 {
            font-size: 1.1rem;
            margin-bottom: 8px;
            color: var(--text-primary);
        }

        .detail-hasil p {
            color: var(--text-secondary);
            line-height: 1.7;
        }

        /* MODAL LIGHTBOX */
        .modal {
            display: none;
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0,0,0,0.92);
            z-index: 2000;
            align-items: center;
            justify-content: center;
            padding: 40px;
        }

        .modal.active { display: flex; }

        .modal img {
            max-width: 90%;
            max-height: 85vh;
            object-fit: contain;
            border-radius: var(--radius-sm);
            box-shadow: var(--shadow-lg);
        }

        .modal-close {
            position: absolute;
            top: 20px;
            right: 30px;
            font-size: 2.5rem;
            color: white;
            cursor: pointer;
            transition: var(--transition);
            background: none;
            border: none;
            opacity: 0.6;
        }

        .modal-close:hover { opacity: 1; }

        .modal-nav {
            position: absolute;
            top: 50%;
            transform: translateY(-50%);
            background: rgba(255,255,255,0.1);
            border: none;
            color: white;
            font-size: 2rem;
            padding: 16px 20px;
            cursor: pointer;
            border-radius: 8px;
            transition: var(--transition);
        }

        .modal-nav:hover { background: rgba(255,255,255,0.2); }
        .modal-nav.prev { left: 20px; }
        .modal-nav.next { right: 20px; }
        .modal-nav.hidden { display: none; }

        .modal-counter {
            position: absolute;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            color: var(--text-secondary);
            font-size: 0.9rem;
            background: rgba(0,0,0,0.5);
            padding: 6px 16px;
            border-radius: 50px;
        }

        footer {
            background: var(--primary);
            color: var(--text-muted);
            padding: 32px 0;
            border-top: 1px solid var(--border);
            text-align: center;
        }

        footer p { font-size: 0.9rem; }

        .not-found {
            text-align: center;
            padding: 80px 0;
        }

        .not-found h2 {
            font-size: 2rem;
            margin-bottom: 16px;
            color: var(--text-primary);
        }

        .not-found p { color: var(--text-secondary); }
        .not-found a { color: var(--accent-light); text-decoration: none; }
        .not-found a:hover { text-decoration: underline; }

        @media (max-width: 768px) {
            .navbar .container { flex-wrap: wrap; gap: 12px; }
            .gallery-main { height: 280px; }
            .gallery-thumb { width: 60px; height: 45px; }
            .gallery-nav { width: 36px; height: 36px; font-size: 1rem; opacity: 1; }
            .gallery-nav.prev { left: 8px; }
            .gallery-nav.next { right: 8px; }
            .detail-content h1 { font-size: 1.8rem; }
            .detail-meta { gap: 14px; flex-direction: column; }
            .detail-description { font-size: 0.95rem; }
            .detail-hasil { padding: 18px 20px; }
            .modal { padding: 20px; }
            .modal img { max-width: 95%; max-height: 70vh; }
            .modal-nav { padding: 10px 14px; font-size: 1.5rem; }
            .modal-nav.prev { left: 10px; }
            .modal-nav.next { right: 10px; }
            .gallery-counter { bottom: 70px; }
            .detail-responsibility ul li { font-size: 0.9rem; }
        }

        @media (max-width: 480px) {
            .container { padding: 0 16px; }
            .content { padding: 100px 0 56px; }
            .gallery-main { height: 200px; }
            .gallery-thumb { width: 50px; height: 38px; }
            .detail-content h1 { font-size: 1.4rem; }
            .btn-back { padding: 6px 14px; font-size: 0.85rem; }
            .logo { font-size: 1.1rem; }
            .detail-tools .tags span { font-size: 0.75rem; padding: 4px 12px; }
        }
    </style>
</head>

        // ============================================================
        // STATE GALERI
        // ============================================================
        let currentIndex = 0;
        let currentGallery = [];

        // ============================================================
        // RENDER DETAIL
        // ============================================================
        function renderDetail() {
            const urlParams = new URLSearchParams(window.location.search);
            const id = parseInt(urlParams.get('id'));
            const filter = urlParams.get('filter') || 'all';

            const project = projects.find(p => p.id === id);

            const backButton = document.getElementById('backButton');
            if (backButton) {
                backButton.href = `index.html?filter=${filter}&scroll=${id}`;
            }

            const container = document.getElementById('detailContent');

            if (!project) {
                container.innerHTML = `
                    <div class="not-found">
                        <h2>⚠️ Proyek Tidak Ditemukan</h2>
                        <p>Kembali ke <a href="index.html#portfolio">halaman utama</a>.</p>
                    </div>
                `;
                return;
            }

            currentGallery = project.galeri || [project.gambar];
            currentIndex = 0;

            let thumbsHtml = '';
            const galeri = project.galeri || [project.gambar];
            galeri.forEach((img, idx) => {
                thumbsHtml += `
                    <div class="gallery-thumb ${idx === 0 ? 'active' : ''}" data-index="${idx}">
                        <img src="${img}" alt="Thumbnail ${idx + 1}">
                    </div>
                `;
            });

            const showNav = galeri.length > 1;
            const navHtml = showNav ? `
                <button class="gallery-nav prev" id="galleryPrev"><i class="fas fa-chevron-left"></i></button>
                <button class="gallery-nav next" id="galleryNext"><i class="fas fa-chevron-right"></i></button>
                <div class="gallery-counter">1 / ${galeri.length}</div>
            ` : '';

            // Tanggung Jawab list
            let tanggungJawabHtml = '';
            if (project.tanggung_jawab && project.tanggung_jawab.length > 0) {
                tanggungJawabHtml = `
                    <div class="detail-responsibility">
                        <h3>📋 Tanggung Jawab</h3>
                        <ul>
                            ${project.tanggung_jawab.map(t => `<li>${t}</li>`).join('')}
                        </ul>
                    </div>
                `;
            }

            container.innerHTML = `
                <div class="gallery-container" id="galleryContainer">
                    <div class="gallery-main" id="galleryMain">
                        <img src="${galeri[0]}" alt="${project.judul}" id="mainImage">
                        ${navHtml}
                    </div>
                    <div class="gallery-thumbs" id="galleryThumbs">
                        ${thumbsHtml}
                    </div>
                </div>
                <div class="detail-content">
                    <h1>${project.judul}</h1>
                    <div class="detail-meta">
                        <span><i class="fas fa-map-pin"></i> ${project.lokasi}</span>
                        <span><i class="fas fa-calendar-alt"></i> ${project.tahun}</span>
                        <span><i class="fas fa-tag"></i> <span class="badge">${project.kategori}</span></span>
                        ${project.isSkripsi ? '<span><i class="fas fa-star" style="color:#fbbf24;"></i> <span class="badge badge-skripsi">⭐ Skripsi</span></span>' : ''}
                    </div>
                    <div class="detail-description">
                        ${project.deskripsi}
                    </div>
                    ${tanggungJawabHtml}
                    <div class="detail-tools">
                        <h3>🛠️ Tools yang Digunakan</h3>
                        <div class="tags">
                            ${project.tools.map(t => `<span>${t}</span>`).join('')}
                        </div>
                    </div>
                    <div class="detail-hasil">
                        <h3>📌 Hasil</h3>
                        <p>${project.hasil}</p>
                    </div>
                </div>
            `;

            setupGallery(galeri);
        }

        // ============================================================
        // SETUP GALERI
        // ============================================================
        function setupGallery(galeri) {
            const mainImage = document.getElementById('mainImage');
            const thumbs = document.querySelectorAll('.gallery-thumb');
            const prevBtn = document.getElementById('galleryPrev');
            const nextBtn = document.getElementById('galleryNext');
            const counter = document.querySelector('.gallery-counter');
            const galleryMain = document.getElementById('galleryMain');

            if (!mainImage) return;

            const updateGallery = (index) => {
                currentIndex = index;
                mainImage.src = galeri[index];
                mainImage.alt = `Gambar ${index + 1}`;

                thumbs.forEach((thumb, i) => {
                    thumb.classList.toggle('active', i === index);
                });

                if (counter) {
                    counter.textContent = `${index + 1} / ${galeri.length}`;
                }

                if (prevBtn) prevBtn.style.display = index === 0 ? 'none' : 'flex';
                if (nextBtn) nextBtn.style.display = index === galeri.length - 1 ? 'none' : 'flex';
            };

            thumbs.forEach((thumb) => {
                thumb.addEventListener('click', () => {
                    const index = parseInt(thumb.dataset.index);
                    updateGallery(index);
                });
            });

            if (prevBtn) {
                prevBtn.addEventListener('click', (e) => {
                    e.stopPropagation();
                    if (currentIndex > 0) updateGallery(currentIndex - 1);
                });
            }

            if (nextBtn) {
                nextBtn.addEventListener('click', (e) => {
                    e.stopPropagation();
                    if (currentIndex < galeri.length - 1) updateGallery(currentIndex + 1);
                });
            }

            if (galleryMain) {
                galleryMain.addEventListener('click', () => {
                    openLightbox(currentIndex);
                });
            }

            updateGallery(0);
        }

        // ============================================================
        // LIGHTBOX
        // ============================================================
        function openLightbox(index) {
            const modal = document.getElementById('lightbox');
            const modalImg = document.getElementById('modalImage');
            const modalPrev = document.getElementById('modalPrev');
            const modalNext = document.getElementById('modalNext');
            const modalCounter = document.getElementById('modalCounter');

            if (!modal || !modalImg) return;

            const galeri = currentGallery;
            if (!galeri || galeri.length === 0) return;

            let current = index;

            const updateModal = (idx) => {
                current = idx;
                modalImg.src = galeri[idx];
                modalImg.alt = `Gambar ${idx + 1}`;

                if (modalCounter) {
                    modalCounter.textContent = `${idx + 1} / ${galeri.length}`;
                }

                if (modalPrev) {
                    modalPrev.style.display = idx === 0 ? 'none' : 'flex';
                }
                if (modalNext) {
                    modalNext.style.display = idx === galeri.length - 1 ? 'none' : 'flex';
                }
            };

            const prevHandler = () => {
                if (current > 0) updateModal(current - 1);
            };
            const nextHandler = () => {
                if (current < galeri.length - 1) updateModal(current + 1);
            };

            const newPrev = modalPrev.cloneNode(true);
            const newNext = modalNext.cloneNode(true);
            if (modalPrev.parentNode) modalPrev.parentNode.replaceChild(newPrev, modalPrev);
            if (modalNext.parentNode) modalNext.parentNode.replaceChild(newNext, modalNext);

            newPrev.addEventListener('click', prevHandler);
            newNext.addEventListener('click', nextHandler);

            const keyHandler = (e) => {
                if (!modal.classList.contains('active')) return;
                if (e.key === 'ArrowLeft') prevHandler();
                if (e.key === 'ArrowRight') nextHandler();
                if (e.key === 'Escape') closeLightbox();
            };
            document.addEventListener('keydown', keyHandler);

            const closeBtn = document.getElementById('modalClose');
            const closeHandler = () => closeLightbox();
            closeBtn.addEventListener('click', closeHandler);

            modal.addEventListener('click', (e) => {
                if (e.target === modal) closeLightbox();
            });

            modal._cleanup = () => {
                document.removeEventListener('keydown', keyHandler);
                closeBtn.removeEventListener('click', closeHandler);
            };

            updateModal(index);
            modal.classList.add('active');
            document.body.style.overflow = 'hidden';
        }

        function closeLightbox() {
            const modal = document.getElementById('lightbox');
            if (!modal) return;
            modal.classList.remove('active');
            document.body.style.overflow = '';
            if (modal._cleanup) modal._cleanup();
        }

        // ============================================================
        // INIT
        // ============================================================
        document.addEventListener('DOMContentLoaded', renderDetail);
    </script>
